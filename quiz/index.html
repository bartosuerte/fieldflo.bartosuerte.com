    <style>
      /* ============================================================
         FieldFlō Prep quiz — Bartosuerte Design System tokens.
         Softer-black canvas per request (was #0B0B0B harsh near-black).
         ============================================================ */
      :root {
        /* color — softened black canvas (#101010, matches the site + portfolio) */
        --bg: #101010;          /* was #0B0B0B */
        --surface: #141414;
        --surface-2: #1a1a1a;
        --surface-3: #202020;
        --line: #262626;
        --gold: #f8b828;
        --gold-dim: #c9941f;
        --gold-hi: #ffc945;
        --white: #ffffff;
        --text: #ececec;
        --muted: #8a8a8a;
        --muted-2: #5e5e5e;
        --green: #37d67a;
        --red: #e0564b;
        --amber: #e0a23b;
        --gold-08: rgba(248, 184, 40, 0.08);
        --gold-10: rgba(248, 184, 40, 0.1);
        --gold-14: rgba(248, 184, 40, 0.14);
        --gold-18: rgba(248, 184, 40, 0.18);
        --gold-22: rgba(248, 184, 40, 0.22);
        --gold-35: rgba(248, 184, 40, 0.35);
        --gold-40: rgba(248, 184, 40, 0.4);
        --green-12: rgba(55, 214, 122, 0.12);
        --green-40: rgba(55, 214, 122, 0.4);
        --red-12: rgba(224, 86, 75, 0.12);
        --red-40: rgba(224, 86, 75, 0.4);
        --amber-12: rgba(224, 162, 59, 0.12);
        --amber-40: rgba(224, 162, 59, 0.4);

        /* type */
        --display: "Anton", "Arial Narrow", sans-serif;
        --body: "Montserrat", system-ui, -apple-system, "Segoe UI", sans-serif;
        --mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
        --ls-eyebrow: 0.22em;
        --ls-label: 0.14em;

        /* shape */
        --maxw: 720px;
        --pad-wrap: 20px;
        --r-card: 16px;
        --r-card-lg: 18px;
        --r-control: 10px;
        --r-control-sm: 8px;
        --r-pill: 999px;

        /* effects */
        --glass-bg: rgba(20, 20, 22, 0.55);
        --glass-blur: blur(14px);
        --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
        --t-fast: 0.15s;
        --t-base: 0.18s;
        --t-slow: 0.55s;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { background: var(--bg); -webkit-text-size-adjust: 100%; }
      body {
        background: transparent;
        color: var(--text);
        font-family: var(--body);
        font-size: 15.5px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        min-height: 100vh;
        min-height: 100dvh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      a { color: inherit; text-decoration: none; }
      button { font-family: inherit; cursor: pointer; }
      ::selection { background: var(--gold); color: #000; }
      .mono { font-family: var(--mono); }
      .gold { color: var(--gold); }

      /* drifting gold field (touch + idle) */
      #bgfx { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
      #bgfx .blob {
        position: absolute; top: 0; left: 0; border-radius: 50%;
        filter: blur(70px); will-change: transform; mix-blend-mode: screen;
      }
      #bgfx .b1 { width: 440px; height: 440px; background: radial-gradient(circle, rgba(248,184,40,0.2), transparent 65%); opacity: 0.5; }
      #bgfx .b2 { width: 340px; height: 340px; background: radial-gradient(circle, rgba(248,184,40,0.15), transparent 66%); opacity: 0.45; }
      #bgfx .b3 { width: 260px; height: 260px; background: radial-gradient(circle, rgba(255,214,92,0.13), transparent 66%); opacity: 0.45; }
      @media (prefers-reduced-motion: reduce) { #bgfx .blob { filter: blur(90px); } }

      .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--pad-wrap); }

      /* ---------- top bar ---------- */
      header.bar {
        position: sticky; top: 0; z-index: 50;
        background: rgba(24, 24, 25, 0.82);
        backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
        border-bottom: 1px solid var(--line);
      }
      .bar .wrap { display: flex; align-items: center; justify-content: space-between; height: 58px; gap: 12px; }
      .brand { display: inline-flex; align-items: center; gap: 10px; }
      .brand svg { width: 28px; height: 28px; flex: 0 0 auto; fill: var(--gold); }
      .brand .wm { font-family: var(--mono); font-size: 11px; letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--white); line-height: 1.2; }
      .brand .wm span { display: block; color: var(--muted); font-size: 9px; letter-spacing: 0.16em; margin-top: 2px; }
      .bar-right { display: inline-flex; align-items: center; gap: 8px; }
      .pill {
        font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase;
        color: var(--gold); background: var(--gold-10); border: 1px solid var(--gold-22);
        padding: 5px 10px; border-radius: var(--r-pill); white-space: nowrap;
      }
      .icon-btn {
        width: 34px; height: 34px; display: grid; place-items: center; border-radius: var(--r-control-sm);
        background: transparent; border: 1px solid var(--line); color: var(--muted); transition: var(--t-base);
      }
      .icon-btn:hover { border-color: var(--gold-40); color: var(--gold); }
      .icon-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

      /* ---------- view container ---------- */
      main { padding: 26px 0 60px; }
      .view { animation: fade 0.4s var(--ease-out) both; }
      @keyframes fade { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
      @media (prefers-reduced-motion: reduce) { .view { animation: none; } }

      .eyebrow { font-family: var(--mono); font-size: 11.5px; letter-spacing: var(--ls-eyebrow); text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
      .h-title { font-family: var(--display); font-weight: 400; text-transform: uppercase; line-height: 0.98; font-size: clamp(30px, 9vw, 46px); letter-spacing: 0.01em; }
      .h-title .l2 { color: var(--gold); display: block; }
      .lead { color: var(--muted); margin: 12px 0 4px; font-size: 15px; max-width: 52ch; }

      /* ---------- buttons ---------- */
      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        font-weight: 700; font-size: 14px; letter-spacing: 0.02em;
        padding: 13px 18px; border-radius: var(--r-control); border: 1px solid transparent;
        transition: var(--t-base); white-space: nowrap; width: 100%;
      }
      .btn svg { width: 16px; height: 16px; }
      .btn-gold { background: var(--gold); color: #000; }
      .btn-gold:hover { background: var(--gold-hi); transform: translateY(-1px); }
      .btn-gold svg { stroke: #000; fill: none; stroke-width: 2.2; }
      .btn-outline { background: transparent; border-color: var(--gold); color: var(--white); }
      .btn-outline:hover { background: var(--gold-14); color: var(--gold); }
      .btn-ghost { background: transparent; border-color: var(--line); color: var(--text); }
      .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
      .btn[disabled] { opacity: 0.4; pointer-events: none; }
      .btn-row { display: grid; gap: 10px; margin-top: 16px; }
      @media (min-width: 540px) { .btn-row.two { grid-template-columns: 1fr 1fr; } }

      /* ---------- quick start ---------- */
      .quick { display: grid; gap: 10px; margin: 22px 0 30px; }
      .qcard {
        display: flex; align-items: center; gap: 14px; text-align: left;
        background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card);
        padding: 16px 16px; transition: var(--t-base); width: 100%; color: var(--text);
      }
      .qcard:hover { border-color: var(--gold-40); transform: translateY(-1px); }
      .qcard .qi { width: 40px; height: 40px; border-radius: 10px; flex: 0 0 auto; display: grid; place-items: center; background: var(--gold-10); color: var(--gold); }
      .qcard .qi svg { width: 20px; height: 20px; stroke: var(--gold); fill: none; stroke-width: 2; }
      .qcard .qt { display: block; font-weight: 700; font-size: 15px; line-height: 1.25; }
      .qcard .qs { display: block; font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em; color: var(--muted); margin-top: 4px; text-transform: uppercase; }
      .qcard .qarrow { margin-left: auto; color: var(--muted-2); font-family: var(--display); font-size: 20px; transition: var(--t-base); }
      .qcard:hover .qarrow { color: var(--gold); transform: translateX(2px); }

      .section-label { font-family: var(--mono); font-size: 11px; letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--muted); margin: 6px 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }

      /* ---------- deck list ---------- */
      .decks { display: grid; gap: 10px; }
      .deck {
        display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px;
        background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card);
        padding: 15px 16px; transition: var(--t-base); width: 100%; text-align: left; color: var(--text);
      }
      .deck:hover { border-color: var(--gold-40); transform: translateY(-1px); }
      .deck .dt { font-weight: 700; font-size: 15.5px; }
      .deck .dm { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); }
      .deck .dm .best { color: var(--gold); }
      .deck .dring { width: 44px; height: 44px; flex: 0 0 auto; }

      /* ---------- settings toggles ---------- */
      .toggles { display: grid; gap: 8px; margin-top: 22px; }
      .toggle { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-control); padding: 12px 14px; }
      .toggle .tl { font-size: 13.5px; font-weight: 600; }
      .toggle .ts { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
      .sw { position: relative; width: 44px; height: 26px; flex: 0 0 auto; border-radius: 999px; background: var(--surface-3); border: 1px solid var(--line); transition: var(--t-base); }
      .sw::after { content: ""; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: var(--muted); transition: var(--t-base); }
      .sw.on { background: var(--gold-18); border-color: var(--gold-40); }
      .sw.on::after { left: 20px; background: var(--gold); }

      /* ---------- quiz screen ---------- */
      .qhead { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
      .qhead .qdeck { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
      .qhead .qcount { font-family: var(--mono); font-size: 11px; color: var(--gold); }
      .ptrack { height: 6px; background: var(--surface-3); border-radius: 6px; overflow: hidden; margin-bottom: 22px; }
      .pfill { height: 100%; width: 0; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); border-radius: 6px; transition: width 0.4s var(--ease-out); }

      .qtag { display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); border: 1px solid var(--gold-22); background: var(--gold-08); padding: 5px 10px; border-radius: var(--r-pill); margin-bottom: 14px; }
      .qtag.card-tag { color: var(--amber); border-color: var(--amber-40); background: var(--amber-12); }
      .qprompt { font-size: 19px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; color: var(--white); }
      .qprompt.big { font-family: var(--display); font-weight: 400; text-transform: none; font-size: clamp(22px, 6vw, 28px); line-height: 1.15; letter-spacing: 0.01em; }
      .qsub { font-size: 13.5px; color: var(--muted); margin-bottom: 20px; }

      /* MC options */
      .opts { display: grid; gap: 10px; }
      .opt {
        display: flex; align-items: flex-start; gap: 12px; text-align: left; width: 100%;
        background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-control);
        padding: 14px 14px; font-size: 14.5px; color: var(--text); transition: var(--t-base); line-height: 1.4;
      }
      .opt:hover { border-color: var(--gold-40); }
      .opt .key { font-family: var(--mono); font-size: 12px; color: var(--muted); border: 1px solid var(--line); border-radius: 6px; width: 24px; height: 24px; display: grid; place-items: center; flex: 0 0 auto; transition: var(--t-base); }
      .opt.correct { border-color: var(--green-40); background: var(--green-12); }
      .opt.correct .key { border-color: var(--green-40); color: var(--green); }
      .opt.wrong { border-color: var(--red-40); background: var(--red-12); }
      .opt.wrong .key { border-color: var(--red-40); color: var(--red); }
      .opt.locked { pointer-events: none; }
      .opt.dim { opacity: 0.5; }
      .opt .mark { margin-left: auto; flex: 0 0 auto; }
      .opt .mark svg { width: 18px; height: 18px; }

      /* card-type rehearsal */
      .reveal-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px dashed var(--gold-40); border-radius: var(--r-card); padding: 16px 16px; margin-top: 4px; }
      .reveal-card .rl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
      .beats { list-style: none; display: grid; gap: 8px; margin-bottom: 14px; }
      .beats li { position: relative; padding-left: 20px; font-size: 14px; color: var(--text); line-height: 1.45; }
      .beats li::before { content: "▸"; position: absolute; left: 0; color: var(--gold); }
      .ideal { font-size: 14px; color: var(--text); line-height: 1.55; border-top: 1px solid var(--line); padding-top: 12px; }
      .ideal .il { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }

      /* explanation */
      .explain { background: var(--surface-2); border: 1px solid var(--line); border-left: 2px solid var(--gold); border-radius: var(--r-control); padding: 13px 14px; margin-top: 14px; font-size: 13.8px; color: var(--text); line-height: 1.5; animation: fade 0.3s var(--ease-out) both; }
      .explain .el { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 6px; }
      .explain .src { display: block; margin-top: 8px; font-family: var(--mono); font-size: 11px; color: var(--muted-2); }

      /* self-grade */
      .grade-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
      .grade {
        display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 6px;
        background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-control);
        font-size: 12.5px; font-weight: 700; transition: var(--t-base); color: var(--text);
      }
      .grade small { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 400; }
      .grade.g-good:hover { border-color: var(--green-40); color: var(--green); }
      .grade.g-mid:hover { border-color: var(--amber-40); color: var(--amber); }
      .grade.g-bad:hover { border-color: var(--red-40); color: var(--red); }

      .qnav { margin-top: 18px; }

      /* ---------- results ---------- */
      .result-top { text-align: center; padding: 12px 0 6px; }
      .ring-wrap { width: 180px; height: 180px; margin: 8px auto 18px; position: relative; }
      .ring-wrap .pct { position: absolute; inset: 0; display: grid; place-items: center; flex-direction: column; }
      .ring-wrap .pct b { font-family: var(--display); font-size: 46px; color: var(--gold); line-height: 1; }
      .ring-wrap .pct small { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
      .verdict { font-family: var(--display); text-transform: uppercase; font-size: 26px; color: var(--white); }
      .verdict-sub { color: var(--muted); font-size: 14px; margin-top: 6px; max-width: 46ch; margin-left: auto; margin-right: auto; }
      .tallies { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 24px 0 6px; }
      .tally { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card); padding: 14px 8px; text-align: center; }
      .tally b { font-family: var(--display); font-size: 30px; line-height: 1; display: block; }
      .tally small { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 6px; display: block; }
      .tally.good b { color: var(--green); }
      .tally.mid b { color: var(--amber); }
      .tally.bad b { color: var(--red); }

      .empty { text-align: center; padding: 40px 10px; color: var(--muted); }
      .empty svg { width: 40px; height: 40px; stroke: var(--gold); fill: none; stroke-width: 1.5; margin-bottom: 14px; }

      .foot { text-align: center; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--muted-2); text-transform: uppercase; margin-top: 40px; line-height: 1.8; }

      /* a2hs hint */
      .a2hs { display: none; align-items: center; gap: 10px; background: var(--surface-2); border: 1px solid var(--gold-22); border-radius: var(--r-card); padding: 12px 14px; margin: 0 0 18px; font-size: 13px; color: var(--text); }
      .a2hs.show { display: flex; }
      .a2hs svg { width: 18px; height: 18px; flex: 0 0 auto; stroke: var(--gold); fill: none; stroke-width: 2; }
      .a2hs .x { margin-left: auto; color: var(--muted); font-family: var(--mono); padding: 2px 6px; }
    </style>
  </head>

    <script>
      /* ===========================================================
         FieldFlō Prep — quiz controller
         =========================================================== */
      (function () {
        "use strict";
        var BANK = JSON.parse(document.getElementById("quiz-bank").textContent);
        var DECKS = BANK.decks;
        var STORE_KEY = "fieldflo-quiz-v1";
        var app = document.getElementById("app");
        var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        /* ---------- persistence ---------- */
        function load() {
          try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
          catch (e) { return {}; }
        }
        function save(s) { try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch (e) {} }
        var state = load();
        state.settings = state.settings || { shuffle: true, hideExplain: false };
        state.best = state.best || {};       // deckKey -> best percent
        state.last = state.last || {};       // deckKey -> last percent
        state.misses = state.misses || {};   // questionId -> true
        if (!state.a2hsDismissed) state.a2hsDismissed = false;

        /* ---------- helpers ---------- */
        function esc(s) {
          return String(s == null ? "" : s)
            .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
        function shuffle(arr) {
          var a = arr.slice();
          for (var i = a.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = a[i]; a[i] = a[j]; a[j] = t;
          }
          return a;
        }
        function allQuestions() {
          var out = [];
          DECKS.forEach(function (d) {
            d.questions.forEach(function (q) {
              out.push(Object.assign({ _deck: d.title, _key: d.key }, q));
            });
          });
          return out;
        }
        function deckByKey(k) {
          for (var i = 0; i < DECKS.length; i++) if (DECKS[i].key === k) return DECKS[i];
          return null;
        }
        function ringSVG(pct, size) {
          var s = size || 44;
          var deg = Math.round((pct / 100) * 360);
          var inner = s - 10;
          return (
            '<div style="width:' + s + "px;height:" + s + 'px;border-radius:50%;background:conic-gradient(var(--gold) ' +
            deg + "deg, var(--surface-3) " + deg + 'deg);display:grid;place-items:center">' +
            '<div style="width:' + inner + "px;height:" + inner +
            'px;border-radius:50%;background:var(--surface);display:grid;place-items:center;font-family:var(--mono);font-size:' +
            (s > 100 ? 0 : 10) + 'px;color:var(--gold)">' + (s > 100 ? "" : pct) + "</div></div>"
          );
        }

        /* ---------- session ---------- */
        var session = null; // {title,key,questions,idx,results:{id->score},answered:bool,mode}

        function startSession(opts) {
          var qs = opts.questions.slice();
          if (state.settings.shuffle) qs = shuffle(qs);
          session = {
            title: opts.title, key: opts.key || "mixed", mode: opts.mode || "deck",
            questions: qs, idx: 0, results: {}, answered: false, picked: null, revealed: false
          };
          location.hash = "#/quiz";
          renderQuiz();
        }

        /* ===================== VIEWS ===================== */

        function renderHome() {
          session = null;
          var totalQ = allQuestions().length;
          var missCount = Object.keys(state.misses).length;

          var a2hs = "";
          var isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
          var standalone = window.navigator.standalone || window.matchMedia("(display-mode: standalone)").matches;
          if (isiOS && !standalone && !state.a2hsDismissed) {
            a2hs =
              '<div class="a2hs show"><svg viewBox="0 0 24 24"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 20h16"/></svg>' +
              "<span>Tip: tap Share, then <b>Add to Home Screen</b> to use this like an app.</span>" +
              '<button class="x" id="a2hsX" aria-label="dismiss">✕</button></div>';
          }

          var quick =
            '<div class="quick">' +
            qcard("mixed", "Mixed quiz", totalQ + " questions · all decks", icon("shuffle")) +
            qcard("money", "Money answers", "rehearse the 3 critical answers", icon("target")) +
            (missCount
              ? qcard("misses", "Review my misses", missCount + " to clean up", icon("repeat"))
              : "") +
            "</div>";

          var deckHTML = DECKS.map(function (d) {
            var best = state.best[d.key];
            var last = state.last[d.key];
            var meta =
              '<span>' + d.questions.length + " Q</span>" +
              (best != null ? '<span class="best">best ' + best + "%</span>" : "<span>not started</span>") +
              (last != null ? "<span>last " + last + "%</span>" : "");
            return (
              '<button class="deck" data-deck="' + d.key + '">' +
              '<div><div class="dt">' + esc(d.title) + '</div><div class="dm">' + meta + "</div></div>" +
              '<div class="dring">' + (best != null ? ringSVG(best, 44) : ringSVG(0, 44)) + "</div>" +
              "</button>"
            );
          }).join("");

          var t = state.settings;
          var toggles =
            '<div class="toggles">' +
            toggle("shuffle", "Shuffle questions", "randomize order each run", t.shuffle) +
            toggle("hideExplain", "Hide explanations", "rehearse mode, no coaching notes", t.hideExplain) +
            "</div>";

          app.innerHTML =
            '<section class="view">' +
            a2hs +
            '<div class="eyebrow">Interview Rehearsal · FieldFlō Sr. Product Designer</div>' +
            '<h1 class="h-title">Game Plan<span class="l2">Quiz</span></h1>' +
            '<p class="lead">Drill the cheat sheet and the gap playbook until the money answers are cold. Tap an option to lock it in; rehearse the long answers out loud, then grade yourself.</p>' +
            quick +
            '<div class="section-label">Decks</div>' +
            '<div class="decks">' + deckHTML + "</div>" +
            toggles +
            '<div class="foot">Never lie · Never volunteer a weakness unprompted · Trade on the rarest thing you bring</div>' +
            "</section>";

          // wire
          Array.prototype.forEach.call(app.querySelectorAll(".qcard"), function (el) {
            el.addEventListener("click", function () { quickStart(el.getAttribute("data-q")); });
          });
          Array.prototype.forEach.call(app.querySelectorAll(".deck"), function (el) {
            el.addEventListener("click", function () {
              var d = deckByKey(el.getAttribute("data-deck"));
              if (d) startSession({ title: d.title, key: d.key, questions: tagged(d), mode: "deck" });
            });
          });
          Array.prototype.forEach.call(app.querySelectorAll(".toggle"), function (el) {
            el.addEventListener("click", function () {
              var k = el.getAttribute("data-t");
              state.settings[k] = !state.settings[k];
              save(state);
              el.querySelector(".sw").classList.toggle("on", state.settings[k]);
            });
          });
          var x = document.getElementById("a2hsX");
          if (x) x.addEventListener("click", function () {
            state.a2hsDismissed = true; save(state);
            var n = x.closest(".a2hs"); if (n) n.classList.remove("show");
          });
        }

        function tagged(d) {
          return d.questions.map(function (q) { return Object.assign({ _deck: d.title, _key: d.key }, q); });
        }
        function qcard(q, title, sub, ic) {
          return (
            '<button class="qcard" data-q="' + q + '">' +
            '<span class="qi">' + ic + "</span>" +
            '<span><span class="qt">' + esc(title) + '</span><span class="qs">' + esc(sub) + "</span></span>" +
            '<span class="qarrow">→</span></button>'
          );
        }
        function toggle(k, label, sub, on) {
          return (
            '<div class="toggle" data-t="' + k + '"><div><div class="tl">' + esc(label) +
            '</div><div class="ts">' + esc(sub) + '</div></div><div class="sw' + (on ? " on" : "") + '"></div></div>'
          );
        }

        function quickStart(q) {
          if (q === "mixed") startSession({ title: "Mixed quiz", key: "mixed", questions: allQuestions(), mode: "mixed" });
          else if (q === "misses") {
            var all = allQuestions().filter(function (x) { return state.misses[x.id]; });
            if (!all.length) return renderHome();
            startSession({ title: "Review misses", key: "misses", questions: all, mode: "misses" });
          } else {
            var d = deckByKey(q);
            if (d) startSession({ title: d.title, key: d.key, questions: tagged(d), mode: "deck" });
          }
        }

        function icon(name) {
          var p = {
            shuffle: '<path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/>',
            target: '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/>',
            repeat: '<path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>'
          };
          return '<svg viewBox="0 0 24 24">' + p[name] + "</svg>";
        }

        /* ---------- quiz ---------- */
        function renderQuiz() {
          if (!session) return renderHome();
          var q = session.questions[session.idx];
          var n = session.questions.length;
          var pct = Math.round((session.idx / n) * 100);

          var body;
          if (q.type === "card") body = renderCard(q);
          else body = renderMC(q);

          app.innerHTML =
            '<section class="view">' +
            '<div class="qhead"><span class="qdeck">' + esc(session.mode === "deck" ? q._deck || session.title : session.title) +
            '</span><span class="qcount">' + (session.idx + 1) + " / " + n + "</span></div>" +
            '<div class="ptrack"><div class="pfill" style="width:' + pct + '%"></div></div>' +
            body +
            "</section>";

          if (q.type === "card") wireCard(q);
          else wireMC(q);
          updateStreak();
        }

        function renderMC(q) {
          var opts = q._order || (q._order = q.options.map(function (_, i) { return i; }));
          if (state.settings.shuffle && !q._shuffled) {
            q._order = shuffle(opts); q._shuffled = true; opts = q._order;
          }
          var letters = ["A", "B", "C", "D", "E"];
          var html =
            '<div class="qtag">' + tagIcon("zap") + " Multiple choice</div>" +
            '<div class="qprompt">' + esc(q.prompt) + "</div>" +
            '<div class="opts">';
          opts.forEach(function (origIdx, pos) {
            html +=
              '<button class="opt" data-i="' + origIdx + '">' +
              '<span class="key">' + letters[pos] + "</span>" +
              "<span>" + esc(q.options[origIdx]) + "</span>" +
              '<span class="mark"></span></button>';
          });
          html += "</div>";
          html += '<div id="afterMC"></div>';
          return html;
        }

        function wireMC(q) {
          var opts = app.querySelectorAll(".opt");
          Array.prototype.forEach.call(opts, function (el) {
            el.addEventListener("click", function () { answerMC(q, parseInt(el.getAttribute("data-i"), 10)); });
          });
        }

        function answerMC(q, choice) {
          if (session.answered) return;
          session.answered = true;
          var correct = choice === q.answer;
          session.results[q.id] = correct ? 1 : 0;
          if (!correct) state.misses[q.id] = true;
          else if (state.misses[q.id]) delete state.misses[q.id];
          save(state);

          var opts = app.querySelectorAll(".opt");
          Array.prototype.forEach.call(opts, function (el) {
            var i = parseInt(el.getAttribute("data-i"), 10);
            el.classList.add("locked");
            if (i === q.answer) { el.classList.add("correct"); el.querySelector(".mark").innerHTML = check(); }
            else if (i === choice) { el.classList.add("wrong"); el.querySelector(".mark").innerHTML = cross(); }
            else el.classList.add("dim");
          });

          var after = document.getElementById("afterMC");
          var ex = "";
          if (!state.settings.hideExplain && q.explanation) {
            ex =
              '<div class="explain"><span class="el">' + (correct ? "Why" : "Correct answer") + "</span>" +
              esc(q.explanation) +
              (q.source ? '<span class="src">source: ' + esc(q.source) + "</span>" : "") +
              "</div>";
          }
          after.innerHTML = ex + '<div class="qnav">' + nextBtn() + "</div>";
          document.getElementById("nextBtn").addEventListener("click", next);
          updateStreak();
        }

        function renderCard(q) {
          var html =
            '<div class="qtag card-tag">' + tagIcon("mic") + " Rehearse out loud</div>" +
            '<div class="qprompt big">' + esc(q.prompt) + "</div>" +
            '<div class="qsub">Say your answer out loud, then reveal the beats and grade yourself honestly.</div>' +
            '<div id="cardArea"><button class="btn btn-outline" id="revealBtn">' + tagIcon("eye") + " Reveal beats &amp; model answer</button></div>";
          return html;
        }

        function wireCard(q) {
          document.getElementById("revealBtn").addEventListener("click", function () { revealCard(q); });
        }

        function revealCard(q) {
          var beats = (q.beats || []).map(function (b) { return "<li>" + esc(b) + "</li>"; }).join("");
          var ideal = q.ideal
            ? '<div class="ideal"><span class="il">Model answer</span>' + esc(q.ideal) + "</div>"
            : "";
          var src = q.source && !state.settings.hideExplain ? '<div class="explain"><span class="el">Source</span>' + esc(q.source) + "</div>" : "";
          document.getElementById("cardArea").innerHTML =
            '<div class="reveal-card"><div class="rl">Hit these beats</div><ul class="beats">' + beats + "</ul>" + ideal + "</div>" +
            src +
            '<div class="grade-row">' +
            '<button class="grade g-good" data-g="1">Nailed it<small>full</small></button>' +
            '<button class="grade g-mid" data-g="0.5">Partial<small>half</small></button>' +
            '<button class="grade g-bad" data-g="0">Missed<small>review</small></button>' +
            "</div>";
          Array.prototype.forEach.call(app.querySelectorAll(".grade"), function (el) {
            el.addEventListener("click", function () { gradeCard(q, parseFloat(el.getAttribute("data-g"))); });
          });
        }

        function gradeCard(q, score) {
          if (session.answered) return;
          session.answered = true;
          session.results[q.id] = score;
          if (score < 1) state.misses[q.id] = true;
          else if (state.misses[q.id]) delete state.misses[q.id];
          save(state);
          var area = document.getElementById("cardArea");
          area.insertAdjacentHTML("beforeend", '<div class="qnav">' + nextBtn() + "</div>");
          document.getElementById("nextBtn").addEventListener("click", next);
          // mark chosen grade
          Array.prototype.forEach.call(app.querySelectorAll(".grade"), function (el) {
            if (parseFloat(el.getAttribute("data-g")) === score) {
              el.style.borderColor = score === 1 ? "var(--green-40)" : score === 0.5 ? "var(--amber-40)" : "var(--red-40)";
              el.style.color = score === 1 ? "var(--green)" : score === 0.5 ? "var(--amber)" : "var(--red)";
            } else el.style.opacity = "0.45";
            el.style.pointerEvents = "none";
          });
          updateStreak();
        }

        function nextBtn() {
          var last = session.idx >= session.questions.length - 1;
          return '<button class="btn btn-gold" id="nextBtn">' + (last ? "See results " + arrow() : "Next question " + arrow()) + "</button>";
        }

        function next() {
          if (session.idx >= session.questions.length - 1) return renderResults();
          session.idx++; session.answered = false; session.picked = null;
          window.scrollTo({ top: 0, behavior: reduce ? "auto" : "smooth" });
          renderQuiz();
        }

        /* ---------- streak pill ---------- */
        function updateStreak() {
          var pill = document.getElementById("streakPill");
          if (!pill || !session) return;
          var scored = Object.keys(session.results).length;
          if (scored === 0) { pill.hidden = true; return; }
          var correct = 0; for (var id in session.results) correct += session.results[id];
          pill.hidden = false;
          pill.textContent = Math.round((correct / scored) * 100) + "% · " + scored + " done";
        }

        /* ---------- results ---------- */
        function renderResults() {
          var n = session.questions.length;
          var pts = 0, good = 0, mid = 0, bad = 0;
          session.questions.forEach(function (q) {
            var s = session.results[q.id];
            if (s == null) s = 0;
            pts += s;
            if (s >= 1) good++; else if (s >= 0.5) mid++; else bad++;
          });
          var pct = Math.round((pts / n) * 100);

          // persist best/last for real decks
          if (session.key && session.key !== "mixed" && session.key !== "misses") {
            state.last[session.key] = pct;
            if (state.best[session.key] == null || pct > state.best[session.key]) state.best[session.key] = pct;
            save(state);
          }

          var verdict, sub;
          if (pct >= 90) { verdict = "Cold."; sub = "You can run this in the room. Send the tool, fix LinkedIn, and walk in."; }
          else if (pct >= 70) { verdict = "Almost there"; sub = "Solid. Tighten the misses below and rehearse the money answers once more out loud."; }
          else if (pct >= 50) { verdict = "Getting warm"; sub = "The structure is landing. Re-run your misses, then drill the three pillars and the gap pivots."; }
          else { verdict = "Run it again"; sub = "Go back to the cheat sheet, then retake. The money answers should be reflex, not recall."; }

          var missList = session.questions.filter(function (q) { return (session.results[q.id] || 0) < 1; });
          var reviewBtn = missList.length
            ? '<button class="btn btn-outline" id="reviewBtn">' + tagIcon("repeat") + " Review " + missList.length + " miss" + (missList.length > 1 ? "es" : "") + "</button>"
            : "";

          app.innerHTML =
            '<section class="view"><div class="result-top">' +
            '<div class="eyebrow" style="text-align:center">' + esc(session.title) + " · result</div>" +
            '<div class="ring-wrap" id="ringWrap"></div>' +
            '<div class="verdict">' + verdict + "</div>" +
            '<div class="verdict-sub">' + sub + "</div>" +
            "</div>" +
            '<div class="tallies">' +
            '<div class="tally good"><b>' + good + "</b><small>nailed</small></div>" +
            '<div class="tally mid"><b>' + mid + "</b><small>partial</small></div>" +
            '<div class="tally bad"><b>' + bad + "</b><small>missed</small></div>" +
            "</div>" +
            '<div class="btn-row two">' +
            reviewBtn +
            '<button class="btn btn-gold" id="retryBtn">' + tagIcon("repeat") + " Retry</button>" +
            "</div>" +
            '<div class="btn-row"><button class="btn btn-ghost" id="decksBtn">All decks</button></div>' +
            '<div class="foot">Trade on the rarest thing you bring</div>' +
            "</section>";

          animateRing(pct);
          document.getElementById("retryBtn").addEventListener("click", function () {
            startSession({ title: session.title, key: session.key, questions: session.questions.map(stripRuntime), mode: session.mode });
          });
          document.getElementById("decksBtn").addEventListener("click", renderHome);
          var rb = document.getElementById("reviewBtn");
          if (rb) rb.addEventListener("click", function () {
            startSession({ title: "Review misses", key: "misses", questions: missList.map(stripRuntime), mode: "misses" });
          });
          var pill = document.getElementById("streakPill"); if (pill) pill.hidden = true;
        }

        function stripRuntime(q) {
          var c = Object.assign({}, q);
          delete c._order; delete c._shuffled;
          return c;
        }

        function animateRing(pct) {
          var wrap = document.getElementById("ringWrap");
          var inner =
            '<div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--gold) 0deg, var(--surface-3) 0deg)"></div>' +
            '<div style="position:absolute;inset:12px;border-radius:50%;background:var(--surface);border:1px solid var(--line)"></div>' +
            '<div class="pct"><b id="pctNum">0</b><small>score</small></div>';
          wrap.innerHTML = inner;
          var arc = wrap.firstChild;
          var num = document.getElementById("pctNum");
          if (reduce) {
            arc.style.background = "conic-gradient(var(--gold) " + (pct * 3.6) + "deg, var(--surface-3) " + (pct * 3.6) + "deg)";
            num.textContent = pct; return;
          }
          var start = null, dur = 900;
          function step(ts) {
            if (!start) start = ts;
            var p = Math.min((ts - start) / dur, 1);
            var eased = 1 - Math.pow(1 - p, 3);
            var cur = Math.round(eased * pct);
            arc.style.background = "conic-gradient(var(--gold) " + (cur * 3.6) + "deg, var(--surface-3) " + (cur * 3.6) + "deg)";
            num.textContent = cur;
            if (p < 1) requestAnimationFrame(step);
          }
          requestAnimationFrame(step);
        }

        /* ---------- tiny icons ---------- */
        function tagIcon(name) {
          var p = {
            zap: '<path d="M13 2L3 14h7l-1 8 10-12h-7z" fill="currentColor" stroke="none"/>',
            mic: '<path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M12 17v4"/>',
            eye: '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>',
            repeat: '<path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>'
          };
          return '<svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:-2px;stroke:currentColor;fill:none;stroke-width:2;display:inline-block">' + p[name] + "</svg>";
        }
        function arrow() { return '<svg viewBox="0 0 24 24" width="16" height="16" style="stroke:currentColor;fill:none;stroke-width:2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>'; }
        function check() { return '<svg viewBox="0 0 24 24" width="18" height="18" style="stroke:var(--green);fill:none;stroke-width:2.4"><path d="M20 6L9 17l-5-5"/></svg>'; }
        function cross() { return '<svg viewBox="0 0 24 24" width="18" height="18" style="stroke:var(--red);fill:none;stroke-width:2.4"><path d="M18 6L6 18M6 6l12 12"/></svg>'; }

        /* ---------- keyboard (desktop) ---------- */
        document.addEventListener("keydown", function (e) {
          if (!session) return;
          var q = session.questions[session.idx];
          if (!q) return;
          if (!session.answered && q.type === "mc") {
            var map = { "1": 0, "2": 1, "3": 2, "4": 3, "a": 0, "b": 1, "c": 2, "d": 3 };
            var k = e.key.toLowerCase();
            if (map[k] != null && map[k] < q.options.length) {
              var btn = app.querySelector('.opt[data-i="' + (q._order ? q._order[map[k]] : map[k]) + '"]');
              if (btn) btn.click();
            }
          } else if ((e.key === "Enter" || e.key === " ") && session.answered) {
            var nb = document.getElementById("nextBtn"); if (nb) { e.preventDefault(); nb.click(); }
          }
        });

        /* ---------- nav ---------- */
        document.getElementById("homeBtn").addEventListener("click", function (e) { e.preventDefault(); location.hash = "#/"; });
        document.querySelector(".brand").addEventListener("click", function (e) { e.preventDefault(); location.hash = "#/"; });
        window.addEventListener("hashchange", route);
        function route() {
          if (location.hash === "#/quiz" && session) renderQuiz();
          else renderHome();
        }

        /* ---------- drifting blobs ---------- */
        (function blobs() {
          if (reduce) return;
          var els = document.querySelectorAll("#bgfx .blob");
          var W = window.innerWidth, H = window.innerHeight;
          window.addEventListener("resize", function () { W = window.innerWidth; H = window.innerHeight; });
          var pts = [];
          for (var i = 0; i < els.length; i++) pts.push({ x: W * (0.3 + 0.2 * i), y: H * (0.25 + 0.18 * i), tx: W * 0.5, ty: H * 0.4, sp: 0.012 + i * 0.006 });
          var target = { x: W * 0.5, y: H * 0.35 };
          window.addEventListener("pointermove", function (e) { target.x = e.clientX; target.y = e.clientY; }, { passive: true });
          var idle = 0;
          function tick() {
            idle += 0.01;
            for (var i = 0; i < pts.length; i++) {
              var p = pts[i];
              var dx = target.x + Math.cos(idle * (0.5 + i * 0.3)) * 80 - p.x;
              var dy = target.y + Math.sin(idle * (0.4 + i * 0.3)) * 80 - p.y;
              p.x += dx * p.sp; p.y += dy * p.sp;
              var el = els[i];
              el.style.transform = "translate(" + (p.x - el.offsetWidth / 2) + "px," + (p.y - el.offsetHeight / 2) + "px)";
            }
            requestAnimationFrame(tick);
          }
          requestAnimationFrame(tick);
        })();

        /* ---------- go ---------- */
        renderHome();
      })();
    </script>
  </body>
</html>
