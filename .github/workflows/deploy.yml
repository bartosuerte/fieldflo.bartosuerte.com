name: Deploy to SiteGround

# Publishes the site to fieldflo.bartosuerte.com whenever you push to main.
# Same proven FTPS setup as your resume.bartosuerte.com / review.bartosuerte.com repos.
on:
  push:
    branches: [ main ]
  workflow_dispatch:        # also lets you trigger a deploy by hand from the Actions tab

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get the latest code
        uses: actions/checkout@v5

      - name: Generate keyed Claude proxy from the example
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, sys
          key = os.environ.get("ANTHROPIC_API_KEY", "").strip()
          if not key:
              sys.exit("ERROR: ANTHROPIC_API_KEY secret is empty")
          src = open("app/claude-proxy.example.php").read()
          needle = "getenv('ANTHROPIC_API_KEY') ?: ''"
          if needle not in src:
              sys.exit("ERROR: key placeholder not found in app/claude-proxy.example.php")
          out = src.replace(needle, "getenv('ANTHROPIC_API_KEY') ?: '" + key + "'", 1)
          open("app/claude-proxy.php", "w").write(out)
          print("Generated app/claude-proxy.php:", len(out), "bytes")
          PY

      - name: Sync files to SiteGround over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps           # encrypted transfer (SiteGround supports this on port 21)
          port: 21
          server-dir: /fieldflo.bartosuerte.com/public_html/   # live folder on SiteGround (confirm path in File Manager; trailing slash required)
          # dry-run: true          # uncomment for a safe no-op preview run, then remove
          #
          # Files in the repo that must NOT be published to the web root.
          # app/claude-proxy.php is generated in the step above (key injected from the
          # ANTHROPIC_API_KEY secret) and IS published; the no-key example is not.
          # NEVER set dangerous-clean-slate: true.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/README.md
            **/CLAUDE.md
            **/PRD.md
            **/DESIGN_SYSTEM.md
            **/.DS_Store
            **/.gitignore
            app/claude-proxy.example.php
